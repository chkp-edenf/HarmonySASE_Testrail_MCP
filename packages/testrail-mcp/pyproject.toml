[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "testrail-mcp"
version = "0.1.0.dev0"
description = "MCP server exposing TestRail to AI assistants via stdio"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Eden Fridman" }]
keywords = ["testrail", "mcp", "model-context-protocol"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Testing",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "mcp>=0.9.0",
    "testrail-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/testrail_mcp"]

[tool.uv.sources]
testrail-core = { workspace = true }
