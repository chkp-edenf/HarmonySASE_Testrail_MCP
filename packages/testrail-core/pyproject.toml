[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "testrail-core"
version = "0.1.0.dev0"
description = "TestRail integration core library — HTTP client, caches, rate limit, retry, schemas"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Eden Fridman" }]
keywords = ["testrail", "qa", "testing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Testing",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/testrail_core"]
